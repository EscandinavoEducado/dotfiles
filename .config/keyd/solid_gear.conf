[main]
# CapsLock toggles a "bypass" layer (turning your custom layer OFF)
capslock = toggle(bypass)

# --- Navigation Map (Layer ON by default) ---
/ = up
rightalt = left
compose = down
rightcontrol = right

# Esc mapping
esc = grave

# --- Shift Layer ---
# This handles Shift + CapsLock to toggle the actual CapsLock state
[shift]
capslock = capslock

# --- Left Alt Overrides ---
# Since Right Alt is mapped to 'left', the standard Alt key (Left Alt) triggers this layer
[alt]
/ = /
esc = esc

[alt+shift]
/ = ?

# --- Bypass Layer (When you press CapsLock) ---
# This forces the keys to revert to their normal behavior
[bypass]
/ = /
rightalt = rightalt
compose = compose
rightcontrol = rightcontrol
esc = esc
